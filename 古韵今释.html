<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古韵今释 - 古籍智能解读平台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .main-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .input-section {
            margin-bottom: 20px;
        }
        .input-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-section {
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            color: #666;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 16px;
        }
        .qa-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .qa-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .qa-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .examples {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .example-btn {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }
        .error-msg {
            background: #fff3f3;
            color: #d32f2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <!-- 头部 -->
            <header class="header">
                <h1>📜 古韵今释</h1>
                <p>古籍智能解读平台</p>
            </header>

            <!-- 主内容 -->
            <main class="main-card">
                <!-- 输入区 -->
                <div class="input-section">
                    <label>📖 输入古文内容</label>
                    <textarea 
                        v-model="inputText" 
                        placeholder="请输入古文内容，或点击下方示例快速加载..."
                    ></textarea>
                    <div class="examples">
                        <button class="example-btn" @click="loadExample(0)">先天下之忧而忧</button>
                        <button class="example-btn" @click="loadExample(1)">落霞与孤鹜齐飞</button>
                        <button class="example-btn" @click="loadExample(2)">路漫漫其修远兮</button>
                        <button class="example-btn" @click="loadExample(3)">关关雎鸠</button>
                    </div>
                </div>

                <!-- 按钮组 -->
                <div class="button-group">
                    <button class="btn btn-primary" @click="translate" :disabled="loading">
                        {{ loading ? '翻译中...' : '🔄 翻译成白话文' }}
                    </button>
                    <button class="btn btn-secondary" @click="clearAll">
                        🗑️ 清空
                    </button>
                </div>

                <!-- 结果区 -->
                <div class="result-section" v-if="translation || answer">
                    <div class="tabs">
                        <div class="tab" :class="{ active: activeTab === 'translate' }" @click="activeTab = 'translate'">
                            📝 翻译结果
                        </div>
                        <div class="tab" :class="{ active: activeTab === 'qa' }" @click="activeTab = 'qa'">
                            💡 深度解读
                        </div>
                    </div>

                    <!-- 翻译结果 -->
                    <div v-if="activeTab === 'translate'">
                        <div class="result-box" v-if="translation">{{ translation }}</div>
                    </div>

                    <!-- 深度解读 -->
                    <div v-if="activeTab === 'qa'">
                        <div class="qa-input">
                            <input 
                                v-model="question" 
                                placeholder="输入问题，如：这段话的深层含义是什么？作者是谁？"
                                @keyup.enter="askQuestion"
                            >
                            <button class="btn btn-primary" @click="askQuestion" :disabled="qaLoading">
                                {{ qaLoading ? '思考中...' : '提问' }}
                            </button>
                        </div>
                        <div class="result-box" v-if="answer">{{ answer }}</div>
                    </div>
                </div>
            </main>

            <!-- 底部 -->
            <footer class="footer">
                <p>基于AI大模型的古籍智能解读平台 | 2026</p>
            </footer>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                // API密钥 - 已配置
                const API_KEY = 'sk-ff458b0435d74479ac0ddbd0d6488c91';
                
                // 状态
                const inputText = ref('');
                const translation = ref('');
                const question = ref('');
                const answer = ref('');
                const activeTab = ref('translate');
                const loading = ref(false);
                const qaLoading = ref(false);

                // 示例古文
                const examples = [
                    '先天下之忧而忧，后天下之乐而乐。\n——范仲淹《岳阳楼记》',
                    '落霞与孤鹜齐飞，秋水共长天一色。\n——王勃《滕王阁序》',
                    '路漫漫其修远兮，吾将上下而求索。\n——屈原《离骚》',
                    '关关雎鸠，在河之洲。窈窕淑女，君子好逑。\n——《诗经·关雎》'
                ];

                // 加载示例
                const loadExample = (index) => {
                    inputText.value = examples[index];
                    translation.value = '';
                    answer.value = '';
                };

                // 调用DeepSeek API
                const callAPI = async (systemPrompt, userMessage) => {
                    const response = await fetch('https://api.deepseek.com/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                { role: 'system', content: systemPrompt },
                                { role: 'user', content: userMessage }
                            ],
                            temperature: 0.7,
                            max_tokens: 2000
                        })
                    });

                    if (!response.ok) {
                        throw new Error('API请求失败');
                    }

                    const data = await response.json();
                    return data.choices[0].message.content;
                };

                // 翻译
                const translate = async () => {
                    if (!inputText.value.trim()) {
                        alert('请输入古文内容');
                        return;
                    }

                    loading.value = true;
                    try {
                        const systemPrompt = `你是一位精通古籍的学者，擅长将古文翻译成通俗易懂的现代白话文。
翻译要求：
1. 保持原文意境，准确传达含义
2. 语言流畅自然，符合现代汉语习惯
3. 对于典故和生僻词，在翻译后用括号注释
4. 保留原文的诗意美感`;

                        const result = await callAPI(systemPrompt, `请将以下古文翻译成现代白话文：\n\n${inputText.value}`);
                        translation.value = result;
                        activeTab.value = 'translate';
                    } catch (error) {
                        alert('翻译失败，请检查网络连接');
                        console.error(error);
                    } finally {
                        loading.value = false;
                    }
                };

                // AI问答
                const askQuestion = async () => {
                    if (!question.value.trim()) {
                        alert('请输入问题');
                        return;
                    }
                    if (!inputText.value.trim()) {
                        alert('请先输入古文内容');
                        return;
                    }

                    qaLoading.value = true;
                    try {
                        const systemPrompt = `你是一位博学的古籍研究学者，擅长解读古文的深层含义。
请根据用户提供的古文内容，回答用户的问题。
回答要求：
1. 准确理解古文的背景和含义
2. 结合历史背景、作者生平进行分析
3. 语言通俗易懂，深入浅出
4. 如有相关典故或其他古籍关联，可以提及`;

                        const result = await callAPI(systemPrompt, `古文内容：\n${inputText.value}\n\n问题：${question.value}`);
                        answer.value = result;
                    } catch (error) {
                        alert('提问失败，请检查网络连接');
                        console.error(error);
                    } finally {
                        qaLoading.value = false;
                    }
                };

                // 清空
                const clearAll = () => {
                    inputText.value = '';
                    translation.value = '';
                    question.value = '';
                    answer.value = '';
                };

                return {
                    inputText,
                    translation,
                    question,
                    answer,
                    activeTab,
                    loading,
                    qaLoading,
                    loadExample,
                    translate,
                    askQuestion,
                    clearAll
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
